<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Borrow Book - Online Library</title>
    </head>
    <body>
        <header id="navbar-container"></header> <!--The navigation bar will be dynamically added with JS-->
        <main>
            <h1>Borrow a Book</h1>
            <p>Only books marked as <strong>Available</strong> can be borrowed.</p>

            <!-- Section: List of available books (dynamically generated) -->
            <h2>Currently Available Books</h2>
            <table border="1" cellpadding="8">
                <thead>
                    <tr>
                        <th>Book ID</th>
                        <th>Book Name</th>
                        <th>Author</th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be populated from server. No hardcoded values. -->
                    <tr>
                        <td colspan="4">No available books at the moment.</td>
                    </tr>
                </tbody>
            </table>

            <!-- Borrow form -->
            <h2>Request Borrow</h2>
            <form action="borrowed_books.html" method="POST">
                <fieldset>
                    <legend>Borrowing Details</legend>

                    <p>
                        <label for="book_id"><strong>Select Book:</strong></label><br>
                        <!-- Dropdown will be populated dynamically with available books -->
                        <select id="book_id" name="book_id" required>
                            <option value="">-- Choose an available book --</option>
                            <!-- Options will be added here dynamically -->
                        </select>
                    </p>

                    <p>
                        <label for="username"><strong>Your Username:</strong></label><br>
                        <input type="text" id="username" name="username" required placeholder="Enter your username">
                    </p>

                    <p>
                        <label for="borrow_date"><strong>Borrow Date:</strong></label><br>
                        <input type="date" id="borrow_date" name="borrow_date" required>
                    </p>

                    <p>
                        <label for="return_date"><strong>Expected Return Date:</strong></label><br>
                        <input type="date" id="return_date" name="return_date" required>
                    </p>

                    <p>
                        <button type="submit">Borrow Book</button>
                        <button type="reset">Clear Form</button>
                    </p>
                </fieldset>
            </form>

        </main>
    </body>
</html>
