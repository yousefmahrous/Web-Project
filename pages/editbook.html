<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images/logo.png" type="image/png">
    <link rel="stylesheet" href="../css/editbook.css">
    <link rel="icon" type="image/png" href="imgs/logo.png">
    <title>Edit Book</title>
</head>

<body>

    <section class="container">
        <div class="wrapper">

            
            <header id="navbar-container"></header>
            
            
            <h1>Edit Book</h1>
            <p>Update the book details below and click Save Changes.</p>

            
            <form id="editForm" method="post" action="">

                
                <div>
                    <label for="bookid">Book ID</label>
                    <input type="number" id="bookid" name="bookid"
                           value="100" readonly>
                </div>

                
                <div>
                    <label for="bookname">Book Name</label>
                    <input type="text" id="bookname" name="bookname"
                           value="Problem Solving with C++" >
                </div>

                
                <div>
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author"
                           value="Walter Savitch" >
                </div>

                
                <div>
                    <label for="category">Category</label>
                    <select id="category" name="category" >
                        <option value="" disabled>Select Category</option>
                        <option value="fiction">Fiction</option>
                        <option value="nonfiction">Non-Fiction</option>
                        <option value="religious">Religious</option>
                        <option value="science">Science</option>
                        <option value="history">History</option>
                        <option value="technology" selected>Technology</option>
                        <option value="biography">Biography</option>
                        <option value="children">Children</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                
                <div>
                    <label for="description">Description</label>
                    <textarea id="description" name="description"
                              rows="4" required>
A comprehensive introduction to C++ programming, covering fundamental concepts, problem-solving techniques, and object-oriented programming.
                    </textarea>
                </div>

                
                <div>
                    <button type="submit">Save Changes</button>
                    <button type="button" id="cancelButton">Cancel</button>
                </div>

            </form>

            <hr>

            
            <h2>Delete Book</h2>
            <p>Warning: Deleting this book cannot be undone.</p>

            <form id="deleteForm"  method="post" action="">
                <div>
                    <input type="hidden" name="bookid" value="100">
                    <button type="submit">Delete Book</button>
                </div>
            </form>

        </div>
    </section>
     <script src="../js/editbook.js"></script>

</body>
</html>
