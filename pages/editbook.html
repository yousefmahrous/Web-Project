<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Book - Online Library</title>
</head>
<body>
  <header id="navbar-container"></header> <!--The navigation bar will be dynamically added with JS-->
  <hr>
  <h1>Edit Book</h1>
  <p>Update the book details below and click Save Changes.</p>

  <!-- EDIT FORM -->
  <form method="post" action="" >

    <label for="bookid">Book ID:</label><br>
    <input type="number" id="bookid" name="bookid" value="100" readonly /><br><br>

    <label for="bookname">Book Name:</label><br>
    <input type="text" id="bookname" name="bookname" value="Problem Solving with C++" required /><br><br>

    <label for="author">Author:</label><br>
    <input type="text" id="author" name="author" value="Walter Savitch" required /><br><br>

    <label for="category">Category:</label><br>
    <select id="category" name="category" required>
      <option value="" disabled>-- Select Category --</option>
      <option value="fiction">Fiction</option>
      <option value="nonfiction">Non-Fiction</option>
      <option value="religious">Religious</option>
      <option value="science">Science</option>
      <option value="history">History</option>
      <option value="technology" selected>Technology</option>
      <option value="biography">Biography</option>
      <option value="children">Children</option>
      <option value="other">Other</option>
    </select><br><br>

    <label for="description">Description:</label><br>
    <textarea id="description" name="description" rows="4" cols="40" required>A comprehensive introduction to C++ programming, covering fundamental concepts, problem-solving techniques, and object-oriented programming. One of the most widely used textbooks for learning C++ in universities, now in its Tenth Edition by Walter Savitch. </textarea><br><br>

    <input type="submit" value="Save Changes" />
    <input type="button" value="Cancel" onclick="window.location.href='book-list-admin.html'" />

  </form>

  <br>
  <hr>

  <!-- DELETE SECTION -->
  <h2>Delete Book</h2>
  <p>Warning: Deleting this book cannot be undone.</p>

  <form method="post" action="" onsubmit="return checkDelete()">
    <input type="hidden" name="bookid" value="100" />
    <input type="submit" value="Delete Book" />
  </form>

  <script>
    function checkDelete() {
      return confirm("Are you sure you want to delete this book? This action cannot be undone.");
    }
  </script>

</body>
</html>
