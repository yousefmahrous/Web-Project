<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Signup page">
    <title>Signup</title>
</head>
<body>
    <header id="navbar-container"></header> <!--The navigation bar will be dynamically added with JS-->
    <section class="container">
        <div class="wrapper">
            <h1>Signup</h1>
            <form action="" method="post">
                <input type="text" name="user_name" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="cpassword" placeholder="Confirm Password" required>
                <input type="email" name="email" placeholder="Email" required>
                <label>
                <input type="radio" name="is_admin" value="Admin" required>
                Admin
                </label>
                <label>
                <input type="radio" name="is_admin" value="User" required>
                User
                </label>
                <br>
                <button type="submit">Signup</button>
            </form>
        </div>
        <div class="member">
            <p>Do you have an account?<a href="login.html">Log in</a></p>
            <a id = "home" href="index.html">Home</a>
        </div>
    </section>
</body>
</html>
