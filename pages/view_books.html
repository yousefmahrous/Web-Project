<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View all books in the library catalog">
    <link rel="shortcut icon" href="../images/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/view_books.css">
    <title>Library Catalog - Knowledge Library</title>
</head>
<body>

    <div id="navbar-container"></div>

    <main class="main-content">

        <section class="catalog-hero">
            <h2>Library Catalog</h2>
            <p>Browse all books available in our collection.</p>
        </section>

        <!-- Filter & Search Bar -->
        <section class="controls-bar">
            <div class="search-group">
                <input type="text" id="searchInput" placeholder="Search by title or author…" autocomplete="off">
            </div>
            <div class="filter-group">
                <label for="statusFilter">Status:</label>
                <select id="statusFilter">
                    <option value="all">All Books</option>
                    <option value="available">Available</option>
                    <option value="borrowed">Borrowed</option>
                </select>

                <label for="categoryFilter">Category:</label>
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </section>

        <div class="results-meta">
            <span id="resultsCount"></span>
        </div>

        <!-- Books Grid — cards injected by JS -->
        <section id="books-grid" class="books-grid"></section>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state" style="display:none;">
            <p>No books match your search or filter.</p>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Knowledge Library. All rights reserved.</p>
    </footer>

    <script src="../js/view_books.js"></script>
</body>
</html>
